<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaducate — get your doubt solved in minutes, not hours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF7F2; --card:#FFFFFF; --ink:#1C1B1A; --muted:#6B6760; --rule:#DFD9CA;
    --signal:#FF5A36; --signal-ink:#7A2A14; --good:#2F6F4F; --warn:#A56B12; --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}
  :focus-visible{outline:2px solid var(--ink);outline-offset:2px;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--rule);background:var(--paper);position:sticky;top:0;z-index:20;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .name{font-size:20px;font-weight:700;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px;}
  .brand .tag{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
  .logo-mark{width:26px;height:26px;flex-shrink:0;}
  nav.mainnav{display:flex;gap:4px;flex-wrap:wrap;}
  nav.mainnav a{padding:8px 12px;border-radius:999px;font-size:14px;font-weight:500;color:var(--muted);}
  nav.mainnav a.active{background:var(--ink);color:var(--paper);}
  nav.mainnav a:not(.active):hover{background:var(--rule);color:var(--ink);}
  .session{display:flex;align-items:center;gap:10px;}
  .pulse-pill{display:flex;align-items:center;gap:6px;font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--muted);padding:4px 10px;border:1px solid var(--rule);border-radius:999px;}
  .pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--good);animation:pulse 1.8s ease-in-out infinite;}
  @media (prefers-reduced-motion: reduce){.pulse-dot{animation:none;}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  .btn{border:none;border-radius:999px;padding:9px 16px;font-size:14px;font-weight:600;}
  .btn-signal{background:var(--signal);color:#fff;}
  .btn-signal:hover{background:#e64a26;}
  .btn-ghost{background:transparent;border:1px solid var(--rule);color:var(--ink);}
  .btn-ghost:hover{background:var(--rule);}
  .btn[disabled]{opacity:.5;cursor:not-allowed;}

  main{max-width:880px;margin:0 auto;padding:28px 20px 80px;}

  .strap{border:1px solid var(--rule);border-radius:var(--radius);background:var(--card);padding:18px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
  .strap h1{font-size:18px;margin:0 0 4px;}
  .strap p{margin:0;color:var(--muted);font-size:13px;}
  .strap .stat{text-align:right;}
  .strap .stat .num{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;}
  .strap .stat .lbl{font-size:11px;color:var(--muted);}

  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{border:1px solid var(--rule);background:var(--card);border-radius:999px;padding:6px 12px;font-size:13px;color:var(--muted);}
  .chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .sortrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .sortrow .lbl{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}

  .card{border:1px solid var(--rule);background:var(--card);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;}
  .qcard{display:block;transition:border-color .15s;}
  .qcard:hover{border-color:var(--ink);}
  .subj{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:6px;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .qtitle{font-size:16px;font-weight:600;margin:0 0 4px;}
  .qsnippet{font-size:13px;color:var(--muted);margin:0 0 10px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .qmeta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);flex-wrap:wrap;gap:8px;}
  .timer{font-family:'IBM Plex Mono',monospace;font-weight:500;padding:3px 8px;border-radius:6px;}
  .timer.good{color:var(--good);background:#EAF3EE;}
  .timer.warn{color:var(--warn);background:#FBF1E2;}
  .timer.signal{color:var(--signal-ink);background:#FDEAE3;}
  .timer.solved{color:var(--good);background:#EAF3EE;}
  .badge-status{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--rule);}

  .empty{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty .display{font-size:18px;color:var(--ink);margin-bottom:6px;}

  .formcard{max-width:560px;margin:0 auto;}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px;}
  input[type=text], textarea, select{width:100%;border:1px solid var(--rule);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:14px;background:var(--paper);color:var(--ink);}
  textarea{min-height:110px;resize:vertical;}
  .subjpick{display:flex;gap:8px;flex-wrap:wrap;}
  .subjpick button{border:1px solid var(--rule);background:var(--paper);border-radius:999px;padding:6px 12px;font-size:13px;}
  .subjpick button.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .err{color:var(--signal-ink);font-size:12px;margin-top:6px;}
  .formfoot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}

  .mediabar{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .mediabtn{border:1px solid var(--rule);background:var(--paper);border-radius:999px;padding:6px 12px;font-size:13px;}
  .mediabtn.recording{background:var(--signal);color:#fff;border-color:var(--signal);}
  .media-preview{margin-top:10px;border:1px solid var(--rule);border-radius:8px;padding:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .media-preview img, .media-preview video{max-width:160px;max-height:120px;border-radius:6px;}
  .media-preview audio{flex:1;min-width:160px;}
  .remove-media{margin-left:auto;border:none;background:none;color:var(--signal-ink);font-size:12px;text-decoration:underline;}

  .suggest-box{border:1px solid var(--rule);border-radius:8px;margin-top:8px;background:#FBF6EA;padding:10px 12px;}
  .suggest-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .suggest-item{display:flex;justify-content:space-between;gap:10px;padding:6px 0;font-size:13px;border-top:1px solid var(--rule);}
  .suggest-item:first-of-type{border-top:none;}
  .suggest-meta{color:var(--muted);font-size:11px;white-space:nowrap;}

  .qmedia img, .qmedia video{max-width:100%;border-radius:8px;margin:10px 0;display:block;}
  .qmedia audio{width:100%;margin:10px 0;display:block;}
  .report-link{font-size:11px;color:var(--muted);background:none;border:none;text-decoration:underline;cursor:pointer;padding:0;}

  .qfull-title{font-size:22px;margin:6px 0 8px;}
  .qfull-body{font-size:15px;color:var(--ink);margin:0 0 14px;white-space:pre-wrap;}
  .answers{margin-top:22px;}
  .answers h3{font-size:14px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
  .ans{display:flex;gap:10px;margin-bottom:14px;}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
  .ans-body{flex:1;border:1px solid var(--rule);border-radius:var(--radius);padding:10px 14px;background:var(--card);}
  .ans-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px;}
  .ans-author{font-size:13px;font-weight:600;}
  .ans-best{font-size:11px;color:var(--good);font-weight:600;}
  .mark-btn{font-size:12px;border:1px solid var(--rule);background:transparent;border-radius:999px;padding:4px 10px;}
  .mark-btn:hover{border-color:var(--good);color:var(--good);}
  .ansform{display:flex;gap:10px;margin-top:18px;}
  .ansform textarea{min-height:46px;}

  .profile-card{border:1px solid var(--rule);border-radius:var(--radius);overflow:hidden;background:var(--card);margin-bottom:18px;}
  .profile-banner{height:80px;background:var(--ink);}
  .profile-body{padding:0 20px 18px;text-align:center;}
  .profile-avatar-lg{width:72px;height:72px;border-radius:50%;background:var(--signal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;border:4px solid var(--card);margin:-36px auto 8px;}
  .profile-name{font-size:18px;margin:0;}
  .profile-stats-row{display:flex;justify-content:center;gap:28px;margin:16px 0 4px;}
  .profile-stats-row .num{font-family:'IBM Plex Mono',monospace;font-size:20px;}
  .profile-stats-row .lbl{font-size:11px;color:var(--muted);}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;justify-content:center;}
  .tag{font-size:12px;border:1px solid var(--rule);border-radius:999px;padding:3px 10px;color:var(--muted);}
  .badge-chip{font-size:12px;background:#F1ECDD;border-radius:999px;padding:3px 10px;color:#7A5A12;}
  .ptabs{display:flex;border-bottom:1px solid var(--rule);margin-bottom:12px;}
  .ptabs button{flex:1;padding:10px;background:none;border:none;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;}
  .ptabs button.active{color:var(--ink);border-bottom-color:var(--signal);}

  .lb-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--rule);}
  .lb-row.me{background:#FBF6EA;border-radius:8px;padding-left:8px;}
  .lb-rank{width:24px;font-family:'IBM Plex Mono',monospace;color:var(--muted);}
  .lb-name{flex:1;font-weight:600;font-size:14px;}
  .lb-pts{font-family:'IBM Plex Mono',monospace;font-size:14px;}

  .overlay{position:fixed;inset:0;background:rgba(28,27,26,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .modal{background:var(--card);border-radius:var(--radius);padding:22px;max-width:360px;width:100%;}
  .modal h3{margin:0 0 4px;}
  .modal p{color:var(--muted);font-size:13px;margin:0 0 14px;}

  @media (max-width:640px){
    nav.mainnav{order:3;width:100%;justify-content:space-between;}
    .strap{flex-direction:column;align-items:flex-start;}
    .strap .stat{text-align:left;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ============================================================
   LEADUCATE — front end. Talks to the Express API in server.js.
   ============================================================ */

const SUBJECTS = {
  'Product Management': '#3B6FA0',
  'Prioritization': '#6B4FA0',
  'Metrics': '#2F8F7A',
  'User Research': '#B0552F',
  'Growth': '#A0473B',
  'Other': '#6B6760'
};

let state = {
  route: 'home', qId: null,
  currentUser: localStorage.getItem('leaducate_user') || null,
  questions: [], openCountTotal: 0, avgSolveMinutes: 0,
  question: null,
  profile: null, profileTab: 'asked',
  leaderboard: [],
  filter: 'All', sort: 'urgent',
  draftSubject: null,
  askMedia: null, answerMedia: null, recording: false,
  similarMatches: [],
  formError: null, authError: null,
  authModal: false, pendingAfterAuth: null,
  loadError: null
};

/* ---------------- API helper ---------------- */
async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    method: opts.method || 'GET',
    headers: opts.body ? { 'Content-Type': 'application/json' } : undefined,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Something went wrong.');
  return data;
}

async function uploadMedia(media) {
  if (!media) return null;
  const form = new FormData();
  if (media.blob) form.append('file', media.blob, media.filename || 'upload');
  else form.append('file', media.file, media.filename);
  const res = await fetch('/api/uploads', { method: 'POST', body: form });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Media upload failed.');
  return { url: data.url, type: data.type };
}

/* ---------------- routing (real hash URLs) ---------------- */
function parseHash() {
  const parts = location.hash.replace(/^#\/?/, '').split('/').filter(Boolean);
  const known = ['home', 'ask', 'question', 'profile', 'leaderboard'];
  const route = known.includes(parts[0]) ? parts[0] : 'home';
  const qId = route === 'question' && parts[1] ? Number(parts[1]) : null;
  return { route, qId };
}
function navigate(route, qId) {
  const target = '#/' + route + (qId ? '/' + qId : '');
  if (location.hash === target) onHashChange();
  else location.hash = target;
}
function onHashChange() {
  const { route, qId } = parseHash();
  state.route = route; state.qId = qId; state.formError = null;
  state.askMedia = null; state.answerMedia = null; state.similarMatches = [];
  window.scrollTo(0, 0);
  loadRoute();
}
function loadRoute() {
  if (state.route === 'home') loadHome();
  else if (state.route === 'question') loadQuestion(state.qId);
  else if (state.route === 'profile') loadProfile();
  else if (state.route === 'leaderboard') loadLeaderboard();
  else render();
}

/* ---------------- data loaders ---------------- */
async function loadHome() {
  render();
  try {
    const qs = new URLSearchParams({ sort: state.sort });
    if (state.filter !== 'All') qs.set('subject', state.filter);
    const data = await api('/questions?' + qs.toString());
    state.questions = data.questions;
    state.openCountTotal = data.openCountTotal;
    state.avgSolveMinutes = data.avgSolveMinutes;
    state.loadError = null;
  } catch (e) { state.loadError = e.message; }
  render();
}
async function loadQuestion(id) {
  render();
  try { const data = await api('/questions/' + id); state.question = data.question; state.loadError = null; }
  catch (e) { state.question = null; state.loadError = e.message; }
  render();
}
async function loadProfile() {
  if (!state.currentUser) { render(); return; }
  render();
  try { const data = await api('/users/' + encodeURIComponent(state.currentUser)); state.profile = data.profile; }
  catch (e) { state.loadError = e.message; }
  render();
}
async function loadLeaderboard() {
  render();
  try { const data = await api('/leaderboard'); state.leaderboard = data.leaderboard; }
  catch (e) { state.loadError = e.message; }
  render();
}
async function primeStats() {
  try { const data = await api('/questions?sort=new'); state.openCountTotal = data.openCountTotal; } catch (e) {}
}

/* ---------------- auth ---------------- */
function requireAuth(action) {
  if (!state.currentUser) { state.pendingAfterAuth = action; state.authModal = true; render(); return false; }
  return true;
}
function openAuth() { state.authError = null; state.authModal = true; render(); }
function closeAuth() { state.authModal = false; state.pendingAfterAuth = null; render(); }

async function submitAuth(e) {
  e.preventDefault();
  const name = e.target.elements.name.value.trim();
  if (!name) return;
  state.authSubmitting = true; render();
  try {
    const data = await api('/users/login', { method: 'POST', body: { name } });
    state.currentUser = data.user.name;
    localStorage.setItem('leaducate_user', data.user.name);
    state.authModal = false; state.authSubmitting = false;
    const pending = state.pendingAfterAuth; state.pendingAfterAuth = null;
    render();
    if (pending) pending();
  } catch (err) { state.authSubmitting = false; state.authError = err.message; render(); }
}
function signOut() { state.currentUser = null; localStorage.removeItem('leaducate_user'); navigate('home'); }

/* ---------------- similar-question suggestions ---------------- */
let similarTimer = null;
function onTitleInput(value) {
  clearTimeout(similarTimer);
  similarTimer = setTimeout(async () => {
    if (value.trim().length < 6) { state.similarMatches = []; patchSimilarBox(); return; }
    try { const data = await api('/questions/search?q=' + encodeURIComponent(value)); state.similarMatches = data.matches; patchSimilarBox(); }
    catch (e) {}
  }, 400);
}
function suggestBoxHtml() {
  if (!state.similarMatches || state.similarMatches.length === 0) return '';
  return `<div class="suggest-box">
    <div class="suggest-label">People already asked something similar</div>
    ${state.similarMatches.map(m => `<a class="suggest-item" href="#/question/${m.id}">${escapeHtml(m.title)}<span class="suggest-meta">${m.status === 'solved' ? '✓ solved' : m.answerCount + ' ans'}</span></a>`).join('')}
  </div>`;
}
function patchSimilarBox() { const el = document.getElementById('similar-suggestions'); if (el) el.innerHTML = suggestBoxHtml(); }

/* ---------------- media capture (ask) ---------------- */
function pickAskFile(e, type) {
  const file = e.target.files[0]; if (!file) return;
  state.askMedia = { file, previewUrl: URL.createObjectURL(file), type, filename: file.name };
  patchAskMediaPreview();
}
function removeAskMedia() { state.askMedia = null; patchAskMediaPreview(); }
function patchAskMediaPreview() { const el = document.getElementById('ask-media-preview'); if (el) el.innerHTML = mediaPreviewHtml(state.askMedia, 'removeAskMedia()'); }

/* ---------------- media capture (answer) ---------------- */
function pickAnswerFile(e, type) {
  const file = e.target.files[0]; if (!file) return;
  state.answerMedia = { file, previewUrl: URL.createObjectURL(file), type, filename: file.name };
  patchAnswerMediaPreview();
}
function removeAnswerMedia() { state.answerMedia = null; patchAnswerMediaPreview(); }
function patchAnswerMediaPreview() { const el = document.getElementById('answer-media-preview'); if (el) el.innerHTML = mediaPreviewHtml(state.answerMedia, 'removeAnswerMedia()'); }

let mediaRecorder = null, audioChunks = [];
async function startVoiceRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      state.answerMedia = { blob, previewUrl: URL.createObjectURL(blob), type: 'audio', filename: 'voice-note.webm' };
      patchAnswerMediaPreview();
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    state.recording = true; patchVoiceBtn();
  } catch (e) { alert("Couldn't access your microphone: " + e.message); }
}
function stopVoiceRecording() { if (mediaRecorder) mediaRecorder.stop(); state.recording = false; patchVoiceBtn(); }
function voiceButtonHtml() {
  return state.recording
    ? `<button id="voice-btn" type="button" class="mediabtn recording" onclick="stopVoiceRecording()">⏹ Stop recording</button>`
    : `<button id="voice-btn" type="button" class="mediabtn" onclick="startVoiceRecording()">🎤 Voice note</button>`;
}
function patchVoiceBtn() { const el = document.getElementById('voice-btn-wrap'); if (el) el.innerHTML = voiceButtonHtml(); }

function mediaPreviewHtml(media, removeCall) {
  if (!media) return '';
  let inner = '';
  if (media.type === 'image') inner = `<img src="${media.previewUrl}" alt="attached photo">`;
  else if (media.type === 'video') inner = `<video src="${media.previewUrl}" controls></video>`;
  else if (media.type === 'audio') inner = `<audio src="${media.previewUrl}" controls></audio>`;
  return `<div class="media-preview">${inner}<button type="button" class="remove-media" onclick="${removeCall}">Remove</button></div>`;
}
function mediaBlockHtml(media) {
  if (!media) return '';
  if (media.type === 'image') return `<div class="qmedia"><img src="${media.url}" alt="attached image"></div>`;
  if (media.type === 'video') return `<div class="qmedia"><video src="${media.url}" controls></video></div>`;
  if (media.type === 'audio') return `<div class="qmedia"><audio src="${media.url}" controls></audio></div>`;
  return '';
}

/* ---------------- reporting ---------------- */
async function reportContent(qId, answerId) {
  if (!confirm('Report this content as inappropriate or a scam? Enough reports will remove it automatically.')) return;
  try {
    const data = await api('/questions/' + qId + '/report', { method: 'POST', body: answerId ? { answerId } : {} });
    if (data.hidden) alert('This content was removed after multiple reports.');
    await loadQuestion(qId);
  } catch (err) { alert(err.message); }
}

/* ---------------- actions ---------------- */
function pickSubject(s) { state.draftSubject = s; render(); }

async function postQuestion(e) {
  e.preventDefault();
  const form = e.target;
  const title = form.elements.title.value.trim();
  const body = form.elements.body.value.trim();
  const subject = state.draftSubject || 'Other';

  const doPost = async () => {
    try {
      let media = null;
      if (state.askMedia) media = await uploadMedia(state.askMedia);
      await api('/questions', { method: 'POST', body: { title, body, subject, author: state.currentUser, media } });
      state.draftSubject = null; state.askMedia = null; state.formError = null;
      navigate('home');
    } catch (err) { state.formError = err.message; render(); }
  };

  if (!requireAuth(doPost)) return;
  await doPost();
}

async function postAnswer(e, qId) {
  e.preventDefault();
  const text = e.target.elements.text.value.trim();
  if (!text && !state.answerMedia) return;

  const doPost = async () => {
    try {
      let media = null;
      if (state.answerMedia) media = await uploadMedia(state.answerMedia);
      await api('/questions/' + qId + '/answers', { method: 'POST', body: { author: state.currentUser, text, media } });
      state.answerMedia = null;
      await loadQuestion(qId);
    } catch (err) { state.formError = err.message; render(); }
  };

  if (!requireAuth(doPost)) return;
  await doPost();
}

async function markBest(qId, ansId) {
  try { await api('/questions/' + qId + '/answers/' + ansId + '/best', { method: 'POST', body: { author: state.currentUser } }); await loadQuestion(qId); }
  catch (err) { state.loadError = err.message; render(); }
}

function setFilter(s) { state.filter = s; loadHome(); }
function setSort(s) { state.sort = s; loadHome(); }
function setProfileTab(t) { state.profileTab = t; render(); }

/* ---------------- helpers ---------------- */
function initials(name) { return name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase(); }
function elapsedInfo(q) {
  if (q.status === 'solved' && q.solvedAt) {
    const m = Math.round((q.solvedAt - q.createdAt) / 60000);
    return { text: fmtMins(m) + ' to solve', cls: 'solved' };
  }
  const m = Math.floor((Date.now() - q.createdAt) / 60000);
  let cls = 'good'; if (m >= 30) cls = 'signal'; else if (m >= 10) cls = 'warn';
  return { text: fmtMins(m) + ' open', cls };
}
function fmtMins(m) { if (m < 1) return '<1m'; if (m < 60) return m + 'm'; return Math.floor(m / 60) + 'h ' + (m % 60) + 'm'; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
const LOGO_SVG = `<svg class="logo-mark" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="30" height="30" rx="8" fill="var(--ink)"/><path d="M9 17l5 5 9-11" stroke="var(--paper)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

/* ---------------- views ---------------- */
function viewTopbar() {
  const links = [['home', 'Home'], ['ask', 'Ask a doubt'], ['leaderboard', 'Leaderboard'], ['profile', 'Profile']];
  return `
  <div class="topbar">
    <div class="brand">
      <a class="name" href="#/home">${LOGO_SVG}Leaducate</a>
      <span class="tag">minutes, not hours</span>
    </div>
    <nav class="mainnav">${links.map(([r, l]) => `<a href="#/${r}" class="${state.route === r ? 'active' : ''}">${l}</a>`).join('')}</nav>
    <div class="session">
      <span class="pulse-pill"><span class="pulse-dot"></span>${state.openCountTotal} open now</span>
      ${state.currentUser
        ? `<button class="btn btn-ghost" onclick="signOut()">${escapeHtml(state.currentUser)} · sign out</button>`
        : `<button class="btn btn-signal" onclick="openAuth()">Sign in</button>`}
    </div>
  </div>`;
}

function viewHome() {
  if (state.loadError) return `<div class="empty"><div class="display">Couldn't load the feed</div><p>${escapeHtml(state.loadError)}</p></div>`;
  const list = state.questions;
  return `
  <div class="strap">
    <div><h1>Live doubt feed</h1><p>Real questions, right now. Jump in and help — or post your own.</p></div>
    <div class="stat"><div class="num">${state.avgSolveMinutes || '—'}${state.avgSolveMinutes ? 'm' : ''}</div><div class="lbl">avg time to solve</div></div>
  </div>
  <div class="filters">
    <button class="chip ${state.filter === 'All' ? 'active' : ''}" onclick="setFilter('All')">All</button>
    ${Object.keys(SUBJECTS).map(s => `<button class="chip ${state.filter === s ? 'active' : ''}" onclick="setFilter('${s}')">${s}</button>`).join('')}
  </div>
  <div class="sortrow">
    <span class="lbl">${list.length} doubt${list.length === 1 ? '' : 's'}</span>
    <span class="lbl">sort:
      <a href="#" onclick="setSort('urgent');return false;" style="${state.sort === 'urgent' ? 'font-weight:700;color:var(--ink)' : ''}">most urgent</a> ·
      <a href="#" onclick="setSort('new');return false;" style="${state.sort === 'new' ? 'font-weight:700;color:var(--ink)' : ''}">newest</a>
    </span>
  </div>
  ${list.length === 0 ? `<div class="empty"><div class="display">No doubts match this filter yet</div><p>Try a different subject, or be the first to ask one.</p></div>` :
    list.map(q => { const info = elapsedInfo(q); return `
      <a class="card qcard" href="#/question/${q.id}">
        <div class="subj"><span class="dot" style="background:${SUBJECTS[q.subject] || SUBJECTS.Other}"></span>${q.subject}</div>
        <div class="qtitle">${escapeHtml(q.title)}</div>
        <div class="qsnippet">${escapeHtml(q.body)}</div>
        <div class="qmeta">
          <span>${escapeHtml(q.author)} · ${q.answerCount} answer${q.answerCount === 1 ? '' : 's'} ${q.media ? '· 📎' : ''}</span>
          <span class="timer ${info.cls}">${info.text}</span>
        </div>
      </a>`; }).join('')}`;
}

function viewAsk() {
  const subj = state.draftSubject;
  return `
  <h1 style="font-size:20px;margin-bottom:2px;">Ask a doubt</h1>
  <p style="color:var(--muted);font-size:13px;margin-top:0;">Be specific — the clearer the question, the faster someone can answer it.</p>
  <form class="card formcard" onsubmit="postQuestion(event)">
    ${state.formError ? `<div class="err" style="margin-bottom:10px;">${escapeHtml(state.formError)}</div>` : ''}
    <label for="title">What's the question, in one line?</label>
    <input type="text" id="title" name="title" placeholder="e.g. RICE vs MoSCoW for prioritization?" oninput="onTitleInput(this.value)">
    <div id="similar-suggestions">${suggestBoxHtml()}</div>

    <label>Subject</label>
    <div class="subjpick">${Object.keys(SUBJECTS).map(s => `<button type="button" class="${subj === s ? 'active' : ''}" onclick="pickSubject('${s}')">${s}</button>`).join('')}</div>

    <label for="body">Add the details</label>
    <textarea id="body" name="body" placeholder="What have you tried? Where exactly are you stuck?"></textarea>

    <label>Attach a photo or video (optional)</label>
    <input type="file" id="ask-photo-input" accept="image/*" capture="environment" style="display:none" onchange="pickAskFile(event,'image')">
    <input type="file" id="ask-video-input" accept="video/*" capture="environment" style="display:none" onchange="pickAskFile(event,'video')">
    <div class="mediabar">
      <button type="button" class="mediabtn" onclick="document.getElementById('ask-photo-input').click()">📷 Photo</button>
      <button type="button" class="mediabtn" onclick="document.getElementById('ask-video-input').click()">🎥 Video</button>
    </div>
    <div id="ask-media-preview">${mediaPreviewHtml(state.askMedia, 'removeAskMedia()')}</div>

    <div class="formfoot">
      <button type="button" class="btn btn-ghost" onclick="navigate('home')">Cancel</button>
      <button type="submit" class="btn btn-signal">Post doubt</button>
    </div>
  </form>`;
}

function viewQuestion() {
  if (!state.question) return `<div class="empty"><div class="display">${state.loadError ? escapeHtml(state.loadError) : 'Loading…'}</div><p><a href="#/home">Back to the feed</a></p></div>`;
  const q = state.question;
  const info = elapsedInfo(q);
  const isAuthor = state.currentUser === q.author;
  return `
  <div class="card">
    <div class="subj"><span class="dot" style="background:${SUBJECTS[q.subject] || SUBJECTS.Other}"></span>${q.subject} · <span class="badge-status">${q.status === 'solved' ? 'Solved' : 'Open'}</span></div>
    <h2 class="qfull-title">${escapeHtml(q.title)}</h2>
    <p class="qfull-body">${escapeHtml(q.body)}</p>
    ${mediaBlockHtml(q.media)}
    <div class="qmeta">
      <span>Asked by ${escapeHtml(q.author)} ${!isAuthor ? `· <button class="report-link" onclick="reportContent(${q.id})">Report</button>` : ''}</span>
      <span class="timer ${info.cls}">${info.text}</span>
    </div>
  </div>
  <div class="answers">
    <h3>${q.answers.length} answer${q.answers.length === 1 ? '' : 's'}</h3>
    ${q.answers.length === 0 ? `<div class="empty" style="padding:24px 0;"><div class="display" style="font-size:15px;">No answers yet</div><p>Be the first to help — points start the moment you reply.</p></div>` : ''}
    ${q.answers.map(a => `
      <div class="ans">
        <div class="avatar">${initials(a.author)}</div>
        <div class="ans-body">
          <div class="ans-head">
            <span class="ans-author">${escapeHtml(a.author)} ${a.isBest ? '<span class="ans-best">✓ best answer</span>' : ''}</span>
            <span style="display:flex;gap:8px;align-items:center;">
              ${(isAuthor && q.status !== 'solved') ? `<button class="mark-btn" onclick="markBest(${q.id},${a.id})">Mark as best</button>` : ''}
              ${state.currentUser !== a.author ? `<button class="report-link" onclick="reportContent(${q.id},${a.id})">Report</button>` : ''}
            </span>
          </div>
          ${a.text ? `<div>${escapeHtml(a.text)}</div>` : ''}
          ${mediaBlockHtml(a.media)}
        </div>
      </div>`).join('')}
    ${q.status !== 'solved' ? `
    <form class="ansform" onsubmit="postAnswer(event, ${q.id})" style="flex-direction:column;">
      <textarea name="text" placeholder="${state.currentUser ? 'Write an answer…' : 'Sign in to answer…'}" rows="1"></textarea>
      <input type="file" id="answer-photo-input" accept="image/*" capture="environment" style="display:none" onchange="pickAnswerFile(event,'image')">
      <input type="file" id="answer-video-input" accept="video/*" capture="environment" style="display:none" onchange="pickAnswerFile(event,'video')">
      <div class="mediabar">
        <button type="button" class="mediabtn" onclick="document.getElementById('answer-photo-input').click()">📷 Photo</button>
        <button type="button" class="mediabtn" onclick="document.getElementById('answer-video-input').click()">🎥 Video</button>
        <span id="voice-btn-wrap">${voiceButtonHtml()}</span>
      </div>
      <div id="answer-media-preview">${mediaPreviewHtml(state.answerMedia, 'removeAnswerMedia()')}</div>
      <div class="formfoot" style="margin-top:10px;"><button class="btn btn-signal" type="submit">Reply</button></div>
    </form>
    ${state.formError ? `<div class="err">${escapeHtml(state.formError)}</div>` : ''}` :
    `<p style="color:var(--muted);font-size:13px;">This doubt is solved — nice work, ${escapeHtml(q.answers.find(a => a.isBest)?.author || '')}.</p>`}
  </div>`;
}

function viewProfile() {
  if (!state.currentUser) return `<div class="empty"><div class="display">Sign in to see your profile</div><p><button class="btn btn-signal" onclick="openAuth()">Sign in</button></p></div>`;
  if (!state.profile) return `<div class="empty"><div class="display">${state.loadError ? escapeHtml(state.loadError) : 'Loading…'}</div></div>`;
  const p = state.profile;
  return `
  <div class="profile-card">
    <div class="profile-banner"></div>
    <div class="profile-body">
      <div class="profile-avatar-lg">${initials(p.name)}</div>
      <h2 class="profile-name">${escapeHtml(p.name)}</h2>
      <span class="badge-chip">${p.badge}</span>
      <div class="profile-stats-row">
        <div><div class="num">${p.points}</div><div class="lbl">points</div></div>
        <div><div class="num">${p.asked.length}</div><div class="lbl">asked</div></div>
        <div><div class="num">${p.answered.length}</div><div class="lbl">answered</div></div>
      </div>
      <div class="tags">${(p.skills.length ? p.skills : ['No skill tags yet']).map(s => `<span class="tag">${escapeHtml(s)}</span>`).join('')}</div>
    </div>
  </div>
  <div class="ptabs">
    <button class="${state.profileTab === 'asked' ? 'active' : ''}" onclick="setProfileTab('asked')">Your doubts (${p.asked.length})</button>
    <button class="${state.profileTab === 'answered' ? 'active' : ''}" onclick="setProfileTab('answered')">Helped with (${p.answered.length})</button>
  </div>
  ${state.profileTab === 'asked'
    ? (p.asked.length === 0 ? `<p style="color:var(--muted);font-size:13px;">You haven't asked anything yet.</p>` :
       p.asked.map(q => `<a class="card qcard" style="display:block;" href="#/question/${q.id}"><div class="qtitle" style="font-size:14px;">${escapeHtml(q.title)}</div><div class="qmeta"><span>${q.subject}</span><span class="badge-status">${q.status}</span></div></a>`).join(''))
    : (p.answered.length === 0 ? `<p style="color:var(--muted);font-size:13px;">No answers posted yet — the feed is waiting.</p>` :
       p.answered.map(q => `<a class="card qcard" style="display:block;" href="#/question/${q.id}"><div class="qtitle" style="font-size:14px;">${escapeHtml(q.title)}</div></a>`).join(''))}`;
}

function viewLeaderboard() {
  return `
  <h1 style="font-size:20px;">Leaderboard</h1>
  <p style="color:var(--muted);font-size:13px;margin-top:-4px;">Ranked by points earned helping others.</p>
  <div class="card">
    ${state.leaderboard.map((u, i) => `
      <div class="lb-row ${u.name === state.currentUser ? 'me' : ''}">
        <div class="lb-rank">${i + 1}</div>
        <div class="avatar" style="width:28px;height:28px;font-size:11px;">${initials(u.name)}</div>
        <div class="lb-name">${escapeHtml(u.name)}${u.name === state.currentUser ? ' (you)' : ''}<br><span class="badge-chip" style="margin-top:2px;">${u.badge}</span></div>
        <div class="lb-pts">${u.points} pts</div>
      </div>`).join('')}
  </div>`;
}

function viewAuthModal() {
  if (!state.authModal) return '';
  return `
  <div class="overlay" onclick="if(event.target===this)closeAuth()">
    <form class="modal" onsubmit="submitAuth(event)">
      <h3>Sign in</h3>
      <p>No password yet — this is an early build. Just tell us your name.</p>
      ${state.authError ? `<div class="err" style="margin-bottom:10px;">${escapeHtml(state.authError)}</div>` : ''}
      <input type="text" name="name" placeholder="Your name" autofocus ${state.authSubmitting ? 'disabled' : ''}>
      <div class="formfoot">
        <button type="button" class="btn btn-ghost" onclick="closeAuth()" ${state.authSubmitting ? 'disabled' : ''}>Cancel</button>
        <button type="submit" class="btn btn-signal" ${state.authSubmitting ? 'disabled' : ''}>${state.authSubmitting ? 'Signing in…' : 'Continue'}</button>
      </div>
    </form>
  </div>`;
}

function render() {
  let page = '';
  if (state.route === 'home') page = viewHome();
  else if (state.route === 'ask') page = viewAsk();
  else if (state.route === 'question') page = viewQuestion();
  else if (state.route === 'profile') page = viewProfile();
  else if (state.route === 'leaderboard') page = viewLeaderboard();
  document.getElementById('root').innerHTML = `${viewTopbar()}<main>${page}</main>${viewAuthModal()}`;
}

setInterval(() => {
  if (state.route === 'home') loadHome();
  else if (state.route === 'question' && state.qId) loadQuestion(state.qId);
}, 15000);

window.addEventListener('hashchange', onHashChange);
primeStats();
onHashChange();
</script>
</body>
</html>
