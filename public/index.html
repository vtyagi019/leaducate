<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaducate Get your doubt solved in minutes, not hours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0B1A;
  --surface:#13132B;
  --surface2:#1A1A35;
  --border:#2A2A4A;
  --purple:#7C3AED;
  --purple-light:#9D5CF6;
  --purple-dim:#2D1B69;
  --text:#FFFFFF;
  --muted:#8B8BA7;
  --good:#22C55E;
  --warn:#F59E0B;
  --danger:#EF4444;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;}
h1,h2,h3{font-family:'Space Grotesk',sans-serif;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
:focus-visible{outline:2px solid var(--purple);outline-offset:2px;}
input,textarea,select{font-family:inherit;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;width:100%;}
input:focus,textarea:focus{border-color:var(--purple);outline:none;}
textarea{resize:vertical;}
label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.04em;}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(11,11,26,.9);position:sticky;top:0;z-index:30;backdrop-filter:blur(12px);gap:12px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;}
.logo-wrap{display:flex;align-items:center;gap:8px;}
.logo-icon{width:32px;height:32px;}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;letter-spacing:-.02em;}
.logo-text span{color:var(--purple-light);}
.logo-tag{font-size:11px;color:var(--muted);margin-left:4px;display:none;}
@media(min-width:640px){.logo-tag{display:inline;}}
nav.mainnav{display:flex;gap:2px;}
nav.mainnav a{padding:8px 14px;border-radius:999px;font-size:14px;font-weight:500;color:var(--muted);transition:all .15s;}
nav.mainnav a.active{background:var(--purple);color:#fff;}
nav.mainnav a:not(.active):hover{background:var(--surface2);color:var(--text);}
.session{display:flex;align-items:center;gap:10px;}
.live-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);padding:5px 12px;border:1px solid var(--border);border-radius:999px;background:var(--surface);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--good);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* btns */
.btn{border:none;border-radius:999px;padding:9px 18px;font-size:14px;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--purple);color:#fff;}
.btn-primary:hover{background:var(--purple-light);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--purple);color:var(--text);}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn[disabled]{opacity:.4;cursor:not-allowed;}
.btn-sm{padding:5px 12px;font-size:12px;}

main{max-width:900px;margin:0 auto;padding:32px 20px 100px;}

/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.card+.card{margin-top:10px;}

/* home */
.hero-strip{background:linear-gradient(135deg,var(--purple-dim),var(--surface));border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.hero-strip h1{font-size:20px;margin-bottom:4px;}
.hero-strip p{color:var(--muted);font-size:13px;}
.hero-stat .num{font-size:28px;font-weight:700;color:var(--purple-light);}
.hero-stat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.chip{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:6px 14px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;}
.chip:hover{border-color:var(--purple);color:var(--text);}
.chip.active{background:var(--purple);border-color:var(--purple);color:#fff;}
.sortrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:12px;color:var(--muted);}
.sortrow a{color:var(--muted);}
.sortrow a.active-sort{color:var(--purple-light);font-weight:600;}

/* qcard */
.qcard{display:block;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;transition:border-color .15s,transform .1s;}
.qcard:hover{border-color:var(--purple);transform:translateY(-1px);}
.subj-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:6px;}
.subj-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.qtitle{font-size:16px;font-weight:600;margin-bottom:4px;line-height:1.3;}
.qsnip{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:10px;}
.qmeta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);flex-wrap:wrap;gap:8px;}
.timer{font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;}
.timer.good{background:#14532D;color:#86EFAC;}
.timer.warn{background:#451A03;color:#FCD34D;}
.timer.hot{background:#450A0A;color:#FCA5A5;}
.timer.solved{background:#14532D;color:#86EFAC;}
.status-badge{font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid var(--border);color:var(--muted);}
.status-badge.solved{border-color:#14532D;color:#86EFAC;}

.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty h3{font-size:18px;color:var(--text);margin-bottom:8px;}

/* ask form */
.form-wrap{max-width:580px;margin:0 auto;}
.form-wrap h1{font-size:22px;margin-bottom:4px;}
.form-wrap .sub{color:var(--muted);font-size:13px;margin-bottom:24px;}
.subjpick{display:flex;gap:8px;flex-wrap:wrap;}
.subjpick button{border:1px solid var(--border);background:var(--surface2);border-radius:999px;padding:7px 14px;font-size:13px;color:var(--muted);transition:all .15s;}
.subjpick button:hover{border-color:var(--purple);color:var(--text);}
.subjpick button.active{background:var(--purple);border-color:var(--purple);color:#fff;}
.err{color:#FCA5A5;font-size:12px;margin-top:6px;}
.formfoot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
.suggest-box{border:1px solid var(--purple-dim);border-radius:8px;background:rgba(124,58,237,.08);padding:12px 14px;margin-top:8px;}
.suggest-label{font-size:11px;color:var(--purple-light);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;font-weight:600;}
.suggest-item{display:flex;justify-content:space-between;gap:10px;padding:7px 0;font-size:13px;border-top:1px solid var(--border);color:var(--text);}
.suggest-item:first-of-type{border-top:none;padding-top:0;}
.suggest-item:hover{color:var(--purple-light);}
.suggest-meta{color:var(--muted);font-size:11px;white-space:nowrap;}

/* media */
.mediabar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.mediabtn{border:1px solid var(--border);background:var(--surface2);border-radius:999px;padding:7px 14px;font-size:13px;color:var(--muted);transition:all .15s;}
.mediabtn:hover{border-color:var(--purple);color:var(--text);}
.mediabtn.rec{background:var(--danger);border-color:var(--danger);color:#fff;}
.media-preview{margin-top:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.media-preview img,.media-preview video{max-width:160px;max-height:120px;border-radius:6px;}
.media-preview audio{flex:1;min-width:160px;}
.rm-media{background:none;border:none;color:var(--danger);font-size:12px;text-decoration:underline;margin-left:auto;}
.qmedia img,.qmedia video{max-width:100%;border-radius:8px;margin:10px 0;display:block;}
.qmedia audio{width:100%;margin:10px 0;display:block;}

/* question detail */
.qfull-title{font-size:22px;margin:8px 0 10px;line-height:1.3;}
.qfull-body{font-size:15px;color:#C4C4D4;white-space:pre-wrap;margin-bottom:14px;}
.answers-section{margin-top:28px;}
.answers-section h3{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;font-weight:600;}
.ans{display:flex;gap:12px;margin-bottom:14px;}
.av{width:34px;height:34px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.ans-card{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;}
.ans-card.best{border-color:var(--good);background:rgba(34,197,94,.05);}
.ans-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px;}
.ans-author{font-size:13px;font-weight:600;}
.best-badge{font-size:11px;color:var(--good);font-weight:700;}
.ans-actions{display:flex;gap:8px;align-items:center;}
.mark-btn{font-size:12px;border:1px solid var(--border);background:transparent;border-radius:999px;padding:4px 12px;color:var(--muted);transition:all .15s;}
.mark-btn:hover{border-color:var(--good);color:var(--good);}
.del-btn{font-size:11px;background:none;border:none;color:var(--danger);text-decoration:underline;opacity:.6;}
.del-btn:hover{opacity:1;}
.report-btn{font-size:11px;background:none;border:none;color:var(--muted);text-decoration:underline;}
.report-btn:hover{color:var(--danger);}
.ansform-wrap{margin-top:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}

/* AI synthesis */
.ai-box{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(157,92,246,.06));border:1px solid var(--purple-dim);border-radius:var(--radius);padding:16px 18px;margin-top:16px;}
.ai-label{font-size:11px;color:var(--purple-light);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.ai-text{font-size:14px;color:#C4C4D4;line-height:1.6;}
.ai-loading{color:var(--muted);font-size:13px;font-style:italic;}

/* profile */
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
.profile-banner{height:90px;background:linear-gradient(135deg,var(--purple-dim),#1a0a40);}
.profile-inner{padding:0 24px 24px;text-align:center;}
.profile-av{width:76px;height:76px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;border:4px solid var(--surface);margin:-38px auto 10px;}
.profile-name{font-size:20px;font-weight:700;margin-bottom:4px;}
.badge-pill{display:inline-block;background:var(--purple-dim);color:var(--purple-light);border-radius:999px;padding:4px 14px;font-size:12px;font-weight:600;}
.pstats{display:flex;justify-content:center;gap:32px;margin:18px 0 10px;}
.pstat .num{font-size:24px;font-weight:700;color:var(--purple-light);}
.pstat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.skills-row{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:10px;}
.skill-tag{font-size:12px;border:1px solid var(--border);border-radius:999px;padding:3px 12px;color:var(--muted);}
.ptabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;}
.ptabs button{flex:1;padding:12px;background:none;border:none;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;}
.ptabs button.active{color:var(--purple-light);border-bottom-color:var(--purple);}

/* leaderboard */
.lb-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.lb-header{display:grid;grid-template-columns:48px 1fr 80px 80px;padding:12px 20px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);}
.lb-row{display:grid;grid-template-columns:48px 1fr 80px 80px;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;transition:background .15s;}
.lb-row:last-child{border-bottom:none;}
.lb-row:hover{background:var(--surface2);}
.lb-row.me{background:rgba(124,58,237,.1);}
.lb-rank{font-size:16px;font-weight:700;}
.lb-user{display:flex;align-items:center;gap:10px;}
.lb-av{width:34px;height:34px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.lb-name{font-size:14px;font-weight:600;}
.lb-meta{font-size:11px;color:var(--muted);}
.lb-pts{font-size:15px;font-weight:700;color:var(--purple-light);text-align:right;}
.lb-ans{font-size:13px;color:var(--muted);text-align:right;}

/* case studies */
.cs-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;transition:border-color .15s;}
.cs-card:hover{border-color:var(--purple);}
.cs-title{font-size:15px;font-weight:600;margin-bottom:6px;}
.cs-meta{font-size:12px;color:var(--muted);margin-bottom:10px;}
.cs-field{margin-bottom:6px;}
.cs-field .fl{font-size:11px;color:var(--purple-light);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.cs-field .fv{font-size:13px;color:#C4C4D4;}
.cs-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.cs-tag{font-size:11px;background:var(--purple-dim);color:var(--purple-light);border-radius:999px;padding:3px 10px;}

/* export */
.export-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end;margin-top:10px;}
.export-btn{font-size:12px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:999px;padding:6px 12px;transition:all .15s;}
.export-btn:hover{border-color:var(--purple);color:var(--text);}

@media print{
  body{background:#fff !important;color:#000 !important;}
  .export-btn,.btn,.chip,.topbar,.overlay,.modal,.form-wrap,.anstransform-wrap,.ans-actions,.report-btn,.del-btn,.mark-btn,.mediabar,.suggest-box{display:none !important;}
  main{padding:0 !important;max-width:none !important;}
  .cs-card{border:1px solid #ddd !important;}
  /* show only selected card */
  .cs-card{display:none !important;}
  .cs-card.print-target{display:block !important;}
}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:380px;width:100%;}
.modal h3{font-size:18px;margin-bottom:4px;}
.modal p{color:var(--muted);font-size:13px;margin-bottom:16px;}
.modal .welcome{font-size:12px;color:var(--good);margin-top:6px;}

@media(max-width:640px){
  .topbar{padding:12px 16px;}
  nav.mainnav a{padding:7px 10px;font-size:13px;}
  .lb-header,.lb-row{grid-template-columns:40px 1fr 60px;}
  .lb-ans{display:none;}
  .hero-strip{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUBJECTS={'Product Management':'#7C3AED','Prioritization':'#6366F1','Metrics':'#06B6D4','User Research':'#F59E0B','Growth':'#22C55E','Other':'#8B8BA7'};
const RANK_ICONS=['🥇','🥈','🥉'];

let state={
  route:'home',qId:null,
  currentUser:localStorage.getItem('lu_user')||null,
  questions:[],openCount:0,avgSolve:0,
  question:null, synthesis:null, synthLoading:false,
  profile:null, profileTab:'asked',
  leaderboard:[],
  caseStudies:[],
  filter:'All',sort:'urgent',
  draftSubject:null,
  askMedia:null,ansMedia:null,recording:false,
  similar:[],
  formErr:null,authErr:null,authModal:false,
  authMsg:null, pendingAfterAuth:null,
  loadErr:null
};

async function api(path,opts={}){
  const res=await fetch('/api'+path,{method:opts.method||'GET',headers:opts.body?{'Content-Type':'application/json'}:undefined,body:opts.body?JSON.stringify(opts.body):undefined});
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||'Something went wrong.');
  return data;
}
async function uploadMedia(media){
  if(!media) return null;
  const form=new FormData();
  if(media.blob) form.append('file',media.blob,media.filename||'upload');
  else form.append('file',media.file,media.filename);
  const res=await fetch('/api/uploads',{method:'POST',body:form});
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||'Upload failed.');
  return {url:data.url,type:data.type};
}

function parseHash(){
  const parts=location.hash.replace(/^#\/?/,'').split('/').filter(Boolean);
  const known=['home','ask','question','profile','leaderboard','cases','add-case'];
  const route=known.includes(parts[0])?parts[0]:'home';
  const qId=route==='question'&&parts[1]?Number(parts[1]):null;
  return{route,qId};
}
function navigate(route,qId){
  const t='#/'+route+(qId?'/'+qId:'');
  if(location.hash===t) onHashChange(); else location.hash=t;
}
function onHashChange(){
  const{route,qId}=parseHash();
  state.route=route;state.qId=qId;state.formErr=null;
  state.askMedia=null;state.ansMedia=null;state.similar=[];
  state.synthesis=null;state.synthLoading=false;
  window.scrollTo(0,0);
  loadRoute();
}
function loadRoute(){
  if(state.route==='home') loadHome();
  else if(state.route==='question') loadQuestion(state.qId);
  else if(state.route==='profile') loadProfile();
  else if(state.route==='leaderboard') loadLeaderboard();
  else if(state.route==='cases') loadCases();
  else render();
}

async function loadHome(){render();try{const qs=new URLSearchParams({sort:state.sort});if(state.filter!=='All')qs.set('subject',state.filter);const d=await api('/questions?'+qs);state.questions=d.questions;state.openCount=d.openCountTotal;state.avgSolve=d.avgSolveMinutes;state.loadErr=null;}catch(e){state.loadErr=e.message;}render();}
async function loadQuestion(id){render();try{const d=await api('/questions/'+id);state.question=d.question;state.loadErr=null;}catch(e){state.question=null;state.loadErr=e.message;}render();if(state.question&&state.question.answers.length>0) loadSynthesis(id);}
async function loadSynthesis(id){state.synthLoading=true;patchSynth();try{const d=await api('/questions/'+id+'/synthesize');state.synthesis=d.synthesis;state.synthLoading=false;patchSynth();}catch(e){state.synthLoading=false;patchSynth();}}
function patchSynth(){const el=document.getElementById('synth-box');if(el)el.innerHTML=synthHtml();}
async function loadProfile(){if(!state.currentUser){render();return;}render();try{const d=await api('/users/'+encodeURIComponent(state.currentUser));state.profile=d.profile;}catch(e){state.loadErr=e.message;}render();}
async function loadLeaderboard(){render();try{const d=await api('/leaderboard');state.leaderboard=d.leaderboard;}catch(e){state.loadErr=e.message;}render();}
async function loadCases(){render();try{const d=await api('/case-studies');state.caseStudies=d.caseStudies;}catch(e){state.loadErr=e.message;}render();}
async function primeStats(){try{const d=await api('/questions?sort=new');state.openCount=d.openCountTotal;}catch(e){}}

function requireAuth(action){if(!state.currentUser){state.pendingAfterAuth=action;state.authMsg=null;state.authErr=null;state.authModal=true;render();return false;}return true;}
function openAuth(){state.authErr=null;state.authMsg=null;state.authModal=true;render();}
function closeAuth(){state.authModal=false;state.pendingAfterAuth=null;render();}
async function submitAuth(e){
  e.preventDefault();
  const name=e.target.elements.name.value.trim();
  if(!name) return;
  state.authSubmitting=true;render();
  try{
    const d=await api('/users/login',{method:'POST',body:{name}});
    state.currentUser=d.user.name;
    localStorage.setItem('lu_user',d.user.name);
    state.authModal=false;state.authSubmitting=false;
    state.authMsg=d.isNew?'new':'returning';
    const pending=state.pendingAfterAuth;state.pendingAfterAuth=null;
    render();if(pending)pending();
  }catch(err){state.authSubmitting=false;state.authErr=err.message;render();}
}
function signOut(){state.currentUser=null;state.profile=null;localStorage.removeItem('lu_user');navigate('home');}

let simTimer=null;
function onTitleInput(v){
  clearTimeout(simTimer);
  simTimer=setTimeout(async()=>{
    if(v.trim().length<6){state.similar=[];patchSim();return;}
    try{const d=await api('/questions/search?q='+encodeURIComponent(v));state.similar=d.matches;patchSim();}catch(e){}
  },400);
}
function patchSim(){const el=document.getElementById('similar-box');if(el)el.innerHTML=simHtml();}
function simHtml(){
  if(!state.similar||!state.similar.length) return '';

function pickAskFile(e,type){const f=e.target.files[0];if(!f)return;state.askMedia={file:f,previewUrl:URL.createObjectURL(f),type,filename:f.name};patchAskPrev();}

function pickAnsFile(e,type){const f=e.target.files[0];if(!f)return;state.ansMedia={file:f,previewUrl:URL.createObjectURL(f),type,filename:f.name};patchAnsPrev();}

function patchAnsPrev(){const el=document.getElementById('ans-prev');if(el)el.innerHTML=mediaPrevHtml(state.ansMedia,'removeAnsMedia()');}
let recorder=null,chunks=[];
async function startRec(){
  try{const s=await navigator.mediaDevices.getUserMedia({audio:true});chunks=[];recorder=new MediaRecorder(s);recorder.ondataavailable=e=>chunks.push(e.data);recorder.onstop=()=>{const b=new Blob(chunks,{type:'audio/webm'});state.ansMedia={blob:b,previewUrl:URL.createObjectURL(b),type:'audio',filename:'voice.webm'};patchAnsPrev();s.getTracks().forEach(t=>t.stop());};recorder.start();state.recording=true;patchVoiceBtn();}catch(e){alert('Mic access denied: '+e.message);}
}
function stopRec(){if(recorder)recorder.stop();state.recording=false;patchVoiceBtn();}
function patchVoiceBtn(){const el=document.getElementById('voice-wrap');if(el)el.innerHTML=voiceBtnHtml();}
function voiceBtnHtml(){return state.recording?`<button id="vbtn" type="button" class="mediabtn rec" onclick="stopRec()">⏹ Stop</button>`:`<button id="vbtn" type="button" class="mediabtn" onclick="startRec()">🎤 Voice</button>`;}
function mediaPrevHtml(media,rmCall){
  if(!media) return '';
  let inner='';
  if(media.type==='image') inner=`<img src="${media.previewUrl}" alt="preview">`;
  else if(media.type==='video') inner=`<video src="${media.previewUrl}" controls></video>`;
  else if(media.type==='audio') inner=`<audio src="${media.previewUrl}" controls></audio>`;
  return`<div class="media-preview">${inner}<button type="button" class="rm-media" onclick="${rmCall}">Remove</button></div>`;
}
function mediaBlockHtml(m){
  if(!m) return '';
  if(m.type==='image') return`<div class="qmedia"><img src="${m.url}" alt="attachment"></div>`;
  if(m.type==='video') return`<div class="qmedia"><video src="${m.url}" controls></video></div>`;
  if(m.type==='audio') return`<div class="qmedia"><audio src="${m.url}" controls></audio></div>`;
  return '';
}

function downloadText(filename, text){
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function caseStudyToMarkdown(c, options = {}){
  const thoughts = (c.thoughts || []).filter(Boolean);
  const tags = Array.isArray(c.tags) ? c.tags : [];

  const header = `# ${c.title || ''}`;
  const meta = `\n**Author:** ${c.author || ''}\n**Industry:** ${c.industry || ''}\n**Created:** ${c.createdAt ? new Date(c.createdAt).toISOString() : ''}`;

  const fields = [
    { k: 'Problem', v: c.problem },
    { k: 'Framework', v: c.framework },
    { k: 'Metric', v: c.metric },
    { k: 'Decision', v: c.decision },
    { k: 'Outcome', v: c.outcome }
  ].filter(x => String(x.v || '').trim().length > 0)
   .map(x => `\n## ${x.k}\n${x.v}`);

  const tagLine = tags.length ? `\n\n**Tags:** ${tags.join(', ')}` : '';

  const thoughtsBlock = thoughts.length
    ? `\n\n---\n## Thoughts\n${thoughts.map(t => `\n### ${t.author || 'Anonymous'}\n${t.createdAt ? new Date(t.createdAt).toISOString() : ''}\n\n${t.text || ''}`).join('')}`
    : '';

  const likesLine = options.includeLikes ? `\n\n**Likes:** ${c.likes || 0}` : '';

  return [header, meta, likesLine, fields.join(''), tagLine, thoughtsBlock].join('');
}

async function exportCaseStudyMarkdown(id){
  try{
    // Ensure freshest data for thoughts
    if(state.caseStudies && state.caseStudies.length){
      const found = state.caseStudies.find(x => x.id === id);
      if(found){
        const md = caseStudyToMarkdown(found, { includeLikes: true });
        downloadText(`case-study-${id}.md`, md);
        return;
      }
    }
    const d = await api('/case-studies');
    const cs = (d.caseStudies || []).find(x => x.id === id);
    if(!cs) throw new Error('Case study not found');
    const md = caseStudyToMarkdown(cs, { includeLikes: true });
    downloadText(`case-study-${id}.md`, md);
  }catch(e){
    alert(e.message || 'Export failed');
  }
}

async function exportCaseStudyPDF(id){
  try{
    // Mark card as print target
    document.querySelectorAll('.cs-card.print-target').forEach(el => el.classList.remove('print-target'));
    const el = document.querySelector(`.cs-card[data-cs-id="${id}"]`);
    if(el) el.classList.add('print-target');

    // Trigger print dialog (user saves as PDF)
    window.print();
  }catch(e){
    alert(e.message || 'PDF export failed');
  }
}

function setFilter(s){state.filter=s;loadHome();}

function setTab(t){state.profileTab=t;render();}
function ini(n){return n.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();}
function elInfo(q){
  if(q.status==='solved'&&q.solvedAt){const m=Math.round((q.solvedAt-q.createdAt)/60000);return{text:fmt(m)+' to solve',cls:'solved'};}
  const m=Math.floor((Date.now()-q.createdAt)/60000);
  return{text:fmt(m)+' open',cls:m>=30?'hot':m>=10?'warn':'good'};
}
function fmt(m){if(m<1)return'<1m';if(m<60)return m+'m';return Math.floor(m/60)+'h '+(m%60)+'m';}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function synthHtml(){
  if(state.synthLoading) return`<div class="ai-box"><div class="ai-label">✦ AI Synthesis</div><div class="ai-loading">Synthesizing answers…</div></div>`;
  if(!state.synthesis) return'';
  return`<div class="ai-box"><div class="ai-label">✦ AI Synthesized Answer</div><div class="ai-text">${esc(state.synthesis)}</div></div>`;
}

    <div><h1 style="font-size:22px;margin-bottom:4px">PM Case Studies</h1><p style="color:var(--muted);font-size:13px">Real decisions, real outcomes — from the community.</p></div>
    <a href="#/add-case" class="btn btn-primary">+ Add yours</a>
  </div>
  ${state.loadErr?`<div class="empty"><h3>${esc(state.loadErr)}</h3></div>`:''}
  ${!state.caseStudies.length?`<div class="empty"><h3>No case studies yet</h3><p>Be the first to add one — earn 10 points.</p></div>`:
  state.caseStudies.map(c=>`
    <div class="cs-card" data-cs-id="${c.id}">
      <div class="cs-title">${esc(c.title)}</div>
      <div class="cs-meta">${esc(c.author)} · ${esc(c.industry)} · ${new Date(c.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>
      ${c.image?`<div class="qmedia"><img src="${c.image}" alt="case study attachment" style="max-width:100%;border-radius:8px;display:block;margin:10px 0;"></div>`:''}
      <div class="cs-field"><span class="fl">Problem</span><div class="fv">${esc(c.problem)}</div></div>
      ${c.framework?`<div class="cs-field"><span class="fl">Framework</span><div class="fv">${esc(c.framework)}</div></div>`:''}
      ${c.decision?`<div class="cs-field"><span class="fl">Decision</span><div class="fv">${esc(c.decision)}</div></div>`:''}
      <div class="cs-field"><span class="fl">Outcome</span><div class="fv">${esc(c.outcome)}</div></div>
      ${c.tags&&c.tags.length?`<div class="cs-tags">${c.tags.map(t=>`<span class="cs-tag">${esc(t)}</span>`).join('')}</div>`:''}

      <div style="margin-top:12px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="likeCase(${c.id})">👍 ${c.likes||0}</button>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <span style="color:var(--muted);font-size:12px">💬 ${c.thoughtsCount||0} thoughts</span>
          ${state.currentUser && state.currentUser===c.author ? `<button class="btn btn-danger btn-sm" onclick="deleteCase(${c.id})">🗑️ Delete</button>` : ''}
        </div>
      </div>

      <div class="export-row">
        <button class="export-btn" type="button" onclick="exportCaseStudyMarkdown(${c.id})">⬇️ Export Markdown</button>
        <button class="export-btn" type="button" onclick="exportCaseStudyPDF(${c.id})">🖨️ Export PDF</button>
      </div>

      <div class="ansform-wrap" style="margin-top:14px">
        <form onsubmit="postCaseThought(event,${c.id})">
          <label>Share your thoughts</label>
          <textarea name="thought" placeholder="Add your feedback / lesson learnt..." style="min-height:64px"></textarea>
          <div class="formfoot" style="justify-content:space-between">
            <button type="button" class="btn btn-ghost" onclick="document.getElementById('root').scrollIntoView()">Cancel</button>
            <button type="submit" class="btn btn-primary">Post</button>
          </div>
        </form>
      </div>

      ${renderCaseThoughts(c.thoughts||[])}
    </div>`).join('')}`;
}


function renderCaseThoughts(thoughts){
  if(!thoughts||!thoughts.length) return `<div style="margin-top:12px;color:var(--muted);font-size:13px">No thoughts yet. Be the first!</div>`;
  return `<div style="margin-top:12px">
    ${thoughts.map(t=>`
      <div class="cs-field" style="margin-bottom:10px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:rgba(26,26,53,.6)">
        <div class="cs-meta" style="margin-bottom:6px">${esc(t.author)} · ${new Date(t.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>
        ${t.image?`<div class="qmedia"><img src="${t.image}" alt="thought attachment" style="max-width:100%;border-radius:8px;display:block;margin:8px 0;"></div>`:''}
        <div class="fv" style="font-size:13px;white-space:pre-wrap">${esc(t.text)}</div>
      </div>
    `).join('')}
  </div>`;
}


function viewAddCase(){

      ${state.formErr?`<div class="err" style="margin-bottom:12px">${esc(state.formErr)}</div>`:''}

function pickCaseImage(e){
  const f=e.target.files[0];
  if(!f) return;
  state.caseImg={file:f,previewUrl:URL.createObjectURL(f),filename:f.name};
  const el=document.getElementById('case-image-prev');
  if(el) el.innerHTML=`<div class="media-preview"><img src="${state.caseImg.previewUrl}" alt="preview" style="max-width:180px;border-radius:8px"/><button type="button" class="rm-media" onclick="removeCaseImage()">Remove</button></div>`;
}

function removeCaseImage(){
  state.caseImg=null;
  const el=document.getElementById('case-image-prev');
  if(el) el.innerHTML='';
  const inp=document.getElementById('case-image');
  if(inp) inp.value='';
}

// ---------------- export (case studies) ----------------
function downloadText(filename, text){
  const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function caseStudyToMarkdown(cs){
  const lines=[];
  lines.push(`# ${cs.title}`);
  lines.push('');
  lines.push(`**Author:** ${cs.author}`);
  lines.push(`**Industry:** ${cs.industry}`);
  if(cs.createdAt) lines.push(`**Date:** ${new Date(cs.createdAt).toLocaleDateString('en-IN')}`);
  lines.push('');
  if(cs.problem){lines.push('## Problem');lines.push(cs.problem);lines.push('');}
  if(cs.framework){lines.push('## Framework');lines.push(cs.framework);lines.push('');}
  if(cs.metric){lines.push('## Metric');lines.push(cs.metric);lines.push('');}
  if(cs.decision){lines.push('## Decision');lines.push(cs.decision);lines.push('');}
  if(cs.outcome){lines.push('## Outcome');lines.push(cs.outcome);lines.push('');}
  if(cs.tags && cs.tags.length){
    lines.push('## Tags');
    lines.push(cs.tags.map(t=>`\`${t}\``).join(' '));
    lines.push('');
  }
  const thoughts=cs.thoughts||[];
  lines.push('## Thoughts');
  if(!thoughts.length){
    lines.push('_No thoughts yet._');
    lines.push('');
  }else{
    thoughts.forEach((t,i)=>{
      lines.push(`### ${i+1}. ${t.author} (${new Date(t.createdAt).toLocaleDateString('en-IN')})`);
      lines.push('');
      lines.push(t.text || '');
      if(t.image) lines.push(`\n![attachment](${t.image})`);
      lines.push('');
    });
  }
  return lines.join('\n');
}
function getCaseById(id){
  const cs=state.caseStudies.find(x=>x.id===id);
  return cs || null;
}
function exportCaseStudyMarkdown(id){
  const cs=getCaseById(id);
  if(!cs){alert('Case study not found in current page state.');return;}
  const md=caseStudyToMarkdown(cs);
  const safeTitle=String(cs.title||('case-study-'+id)).replace(/[^a-z0-9]+/gi,'-').replace(/(^-|-$)/g,'');
  downloadText(`case-study-${safeTitle}.md`, md);
}
function exportCaseStudyPDF(id){
  const csEl=document.querySelector(`.cs-card[data-cs-id="${id}"]`);
  if(!csEl){alert('Case study not found in DOM.');return;}
  // trigger print; CSS shows only .cs-card.print-target
  document.querySelectorAll('.cs-card.print-target').forEach(e=>e.classList.remove('print-target'));
  csEl.classList.add('print-target');
  window.print();
  // cleanup after print dialog opens
  setTimeout(()=>csEl.classList.remove('print-target'),500);
}
